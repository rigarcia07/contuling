<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1584px;
      height: 396px;
      overflow: hidden;
      background: #0b1020;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .banner {
      width: 1584px;
      height: 396px;
      position: relative;
      background:
        radial-gradient(ellipse at 0% 50%, rgba(74,222,128,0.18), transparent 55%),
        radial-gradient(ellipse at 100% 50%, rgba(59,130,246,0.14), transparent 55%),
        linear-gradient(135deg, #0b1020 0%, #0f172a 50%, #0b1020 100%);
      display: flex;
      align-items: center;
      padding: 0 88px;
    }
    .left { flex: 1; display: flex; flex-direction: column; gap: 18px; }
    .name { font-size: 56px; font-weight: 700; color: #f9fafb; letter-spacing: -0.02em; line-height: 1; }
    .tagline { font-size: 24px; color: #4ade80; font-weight: 500; letter-spacing: 0.04em; }
    .pills { display: flex; gap: 10px; flex-wrap: wrap; }
    .pill {
      font-size: 13px; padding: 5px 14px; border-radius: 999px;
      border: 1px solid rgba(74,222,128,0.45); color: #9ca3af;
      background: rgba(74,222,128,0.06); letter-spacing: 0.08em; text-transform: uppercase;
    }
    .divider {
      width: 1px; height: 200px;
      background: linear-gradient(to bottom, transparent, rgba(74,222,128,0.45), transparent);
      margin: 0 80px; flex-shrink: 0;
    }
    .right { display: flex; flex-direction: column; gap: 0; min-width: 340px; }
    .right-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.15em; color: rgba(156,163,175,0.55); margin-bottom: 16px; }
    .right-item { display: flex; align-items: center; gap: 12px; font-size: 17px; color: #e5e7eb; margin-bottom: 12px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 0 3px rgba(74,222,128,0.22); flex-shrink: 0; }
    .location { font-size: 13px; color: rgba(156,163,175,0.65); margin-top: 10px; letter-spacing: 0.03em; }
    .grid {
      position: absolute; inset: 0;
      background-image: linear-gradient(rgba(148,163,184,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(148,163,184,0.04) 1px, transparent 1px);
      background-size: 48px 48px; pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="banner">
    <div class="grid"></div>
    <div class="left">
      <div class="name">Roger Garcia</div>
      <div class="tagline">Operations &middot; AI &middot; Digital Strategy</div>
      <div class="pills">
        <div class="pill">SMB/SME Consulting</div>
        <div class="pill">AI &amp; Automation</div>
        <div class="pill">Workflow Design</div>
        <div class="pill">Fractional Ops</div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="right">
      <div class="right-label">What I help with</div>
      <div class="right-item"><div class="dot"></div><span>Operations &amp; Digital Diagnostic</span></div>
      <div class="right-item"><div class="dot"></div><span>AI &amp; Workflow Sprints</span></div>
      <div class="right-item"><div class="dot"></div><span>Fractional Strategy &amp; Ops</span></div>
      <div class="location">&#x1F4CD; Toronto, Canada &nbsp;&middot;&nbsp; rgarcia@ikg-grp.com</div>
    </div>
  </div>
</body>
</html>
